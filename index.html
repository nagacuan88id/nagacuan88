<style>
  :root {
    --border-size: 3px;
    --glow-color: #a855f7;
    --bg-dark: #0f172a;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background-color: var(--bg-dark);
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: white;
  }

  .main-wrapper {
    display: flex;
    flex-direction: column; 
    align-items: center;
    gap: 15px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
  }

  /* --- KONTANER GAMBAR & LOGO --- */
  .image-container {
    position: relative;
    width: 100%;
    height: 380px;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .image-container::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    background-image: conic-gradient(transparent, var(--glow-color), transparent 30%);
    animation: rotate 3s linear infinite;
  }

  .image-container::after {
    content: '';
    position: absolute;
    inset: var(--border-size);
    background: var(--bg-dark);
    border-radius: 10px;
    z-index: 1;
  }

  /* --- TAMBAHAN EFEK CAHAYA BERJALAN PADA BANNER --- */
  .banner-glow-overlay {
    position: absolute;
    top: 0;
    left: -150%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      to right, 
      transparent 0%, 
      rgba(255, 255, 255, 0) 30%,
      rgba(255, 255, 255, 0.3) 50%, 
      rgba(255, 255, 255, 0) 70%,
      transparent 100%
    );
    transform: skewX(-25deg);
    z-index: 3; /* Di atas gambar utama */
    animation: bannerShine 4s infinite;
  }

  @keyframes bannerShine {
    0% { left: -150%; }
    30% { left: 150%; }
    100% { left: 150%; }
  }

  /* LOGO DI SUDUT */
  .logo-corner {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .logo-corner img {
    width: 120px; 
    height: auto;
    filter: drop-shadow(0 0 5px rgba(0,0,0,0.8));
  }

  .white-line {
    width: 50px;
    height: 2px;
    background: #fff;
    box-shadow: 0 0 10px #fff;
  }

  .main-img {
    position: relative;
    width: calc(100% - (var(--border-size) * 2));
    height: calc(100% - (var(--border-size) * 2));
    object-fit: cover;
    border-radius: 10px;
    z-index: 2;
  }

  /* --- TOMBOL DAFTAR & LOGIN --- */
  .btn-link {
    text-decoration: none;
    width: 100%;
  }

  .btn-custom {
    position: relative;
    width: 100%;
    padding: 14px 0;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff;
    background: #000;
    border: 1px solid var(--glow-color);
    border-radius: 10px;
    cursor: pointer;
    overflow: hidden;
    transition: 0.3s;
    animation: pulse 2s infinite;
  }

  .btn-login { animation-delay: 0.5s; }

  .btn-custom::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shine 3s infinite;
  }

  /* --- MENU TAMBAHAN --- */
  .extra-menu {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 10px;
    width: 100%;
    margin-top: 10px;
  }

  .menu-item {
    background: rgba(168, 85, 247, 0.1);
    border: 1px solid rgba(168, 85, 247, 0.3);
    padding: 10px;
    text-align: center;
    border-radius: 8px;
    text-decoration: none;
    color: #cbd5e1;
    font-size: 12px;
    font-weight: 600;
    transition: 0.3s;
  }

  .menu-item:hover {
    background: var(--glow-color);
    color: white;
  }

  /* --- ANIMASI --- */
  @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }
  @keyframes shine { 0% {left: -100%;} 20% {left: 100%;} 100% {left: 100%;} }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); box-shadow: 0 0 15px var(--glow-color); }
  }

  .btn-custom:hover { border-color: #fff; transform: translateY(-2px); }
</style>
